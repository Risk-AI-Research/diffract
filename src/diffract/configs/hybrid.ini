[logging]
version = 1
disable_existing_loggers = false

[logging.formatters.standard]
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
datefmt = "%Y-%m-%d %H:%M:%S"

[logging.handlers.console]
class = logging.StreamHandler
level = INFO
formatter = standard
stream = ext://sys.stdout

[logging.handlers.file]
class = logging.handlers.RotatingFileHandler
level = INFO
formatter = standard
filename = ".diffract/hybrid.log"
maxBytes = 1048576
backupCount = 1

[logging.loggers.diffract]
level = INFO
handlers = ["console", "file"]
propagate = false

[logging.root]
level = INFO
handlers = ["console", "file"]

[storage]
backend = "hybrid"

[storage.hybrid]
light = "sqlite"
heavy = "hdf5"
array_threshold = 1048576

[storage.sqlite]
path = ".diffract/hybrid/sqlite_storage.db"
blob_write_workers = 8
array_threshold = 1048576
read_mmap_size = 4294967296
write_mmap_size = 4294967296
batch_size_limit_bytes = 4294967296

[storage.hdf5]
path = ".diffract/hybrid/hdf5_storage.h5"
batch_size_limit_bytes = 4294967296

[metadata]
backend = "sqlite"

[metadata.sqlite]
path = ".diffract/hybrid/metadata_index.db"

[cache]
backend = "simple"

[cache.simple]
max_memory_mb = 128_000

[parallel.thread_pool]
max_workers = 8

[parallel.process_pool]
max_workers = 8

[nn.extractor]
skip_not_implemented_types = true

[export]
# Formats beyond "dict"/"json"/"list" need their optional extra installed.
default_export_format = "dict"
