; Hybrid storage configuration (HDF5 + SQLite)

[logging]
version = 1
disable_existing_loggers = false

[logging.formatters.standard]
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
datefmt = "%Y-%m-%d %H:%M:%S"

[logging.handlers.console]
class = logging.StreamHandler
level = WARNING
formatter = standard
stream = ext://sys.stdout

[logging.handlers.file]
class = logging.handlers.RotatingFileHandler
level = INFO
formatter = standard
filename = ".diffract/hybrid.log"
maxBytes = 1048576
backupCount = 1

[logging.loggers.diffract]
level = DEBUG
handlers = ["console", "file"]
propagate = false

[logging.root]
level = DEBUG
handlers = ["console", "file"]

[storage]
backend = "hybrid"

[storage.hdf5]
path = ".diffract/hybrid/hdf5_storage.h5"

[storage.sqlite]
path = ".diffract/hybrid/sqlite_storage.db"

[metadata]
backend = "sqlite"

[metadata.sqlite]
path = ".diffract/hybrid/metadata_index.db"

[cache]
backend = "simple"

[cache.simple]
max_memory_mb = 4096

[parallel.thread_pool]
max_workers = 8

[parallel.process_pool]
max_workers = 8

[nn.extractor]
skip_not_implemented_types = true

[export]
default_export_format = "dict"
