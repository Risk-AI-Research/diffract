plot:
  _target_: diffract.viz.plots.base.UpdateFigure
  plot:
    _target_: diffract.viz.plots.boxplot.BoxPlot
    y: stable_rank
    title: "stable_rank boxplot + jitter (colored by frob_norm)"
    x: model_id
    marker_color: model_id

    # show only box; jitter is drawn as separate scatter layer
    boxpoints: false

    # marker styling (inherited by the jitter overlay)
    marker_size: 5
    marker_opacity: 0.6

    # jitter overlay
    jitter_enabled: true
    jitter_width: 0.12
    jitter_offset: -0.5
    jitter_seed: 42
    jitter_density_scale: true
    jitter_color: frob_norm
    jitter_colorscale: Turbo
    jitter_showscale: true

  layout:
    width: 800
    height: 400
