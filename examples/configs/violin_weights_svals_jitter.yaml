plot:
  _target_: diffract.viz.plots.base.UpdateFigure
  plot:
    _target_: diffract.viz.plots.violin.ViolinPlot
    y: weights_svals
    title: "weights_svals violins + custom jitter"
    x: model_id
    marker_color: model_id

    # violin styling
    side: positive
    points: false
    box_visible: true
    meanline_visible: true

    # marker styling (inherited by the jitter overlay)
    marker_size: 3
    marker_opacity: 0.6

    # jitter overlay
    jitter_enabled: true
    jitter_width: 0.12
    jitter_offset: -0.25
    jitter_seed: 42
    jitter_density_scale: true
    jitter_color: weights_svals
    jitter_colorscale: Turbo
    jitter_showscale: true

  layout:
    width: 800
    height: 400
