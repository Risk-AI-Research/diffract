default_language_version:
  python: python3.12

repos:
  # Core pre-commit hooks for file integrity
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-docstring-first
        files: ^src/.*\.py$

  # Ruff - Fast Python linter and formatter (replaces Black, Flake8, isort, pyupgrade)
  # Linting and formatting. Scoped to the same paths as `make lint` and CI.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        files: ^(src/diffract/|tests/|conftest\.py$)
      - id: ruff-format
        types_or: [python, pyi]
        files: ^(src/diffract/|tests/|conftest\.py$)

  # Type checking is a developer aid, not a gate (see [tool.mypy] in
  # pyproject.toml): run it on demand with `make mypy`, or
  # `pre-commit run --hook-stage manual mypy`.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        stages: [manual]
        args: [--show-error-codes]
        files: ^src/.*\.py$
        additional_dependencies:
          - types-requests
          - types-PyYAML

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        files: ^src/.*\.py$

  # Jupyter notebook support
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.8.7
    hooks:
      - id: nbqa-ruff
        args: [--fix]

  # Remove notebook outputs
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        files: \.ipynb$

  # Documentation formatting
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-black
        files: \.(md|markdown)$
        # MyST reference pages use inline math and directives the GFM
        # formatter cannot round-trip; they are excluded here.
        exclude: ^docs/reference/metrics/

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: [--write-changes]
        additional_dependencies: [tomli]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        # Markdown is owned by mdformat; prettier handles the data formats.
        # (Its prose-wrap splits inline math and conflicts with mdformat.)
        types_or: [yaml, json]
        args: [--prose-wrap=always, --print-width=88]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
