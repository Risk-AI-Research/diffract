param_name: ???
layer: ???

plot:
  _target_: diffract.viz.plots.configurer.UpdateFigure
  layout:
    width: 800
    height: 600
    title: "${param_name}: layer=${layer}"
  plot:
    _target_: diffract.viz.plots.subplots.GridPlot
    make_subplots_kwargs:
      rows: 2
      cols: 1
      shared_yaxes: false
      shared_xaxes: false
      vertical_spacing: 0.1
    subplots:
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 1
      col: 1
      title: "16k pre-train steps model"
      plot:
        _target_: diffract.viz.plots.violin.ViolinPlot
        field: weights_svals
        group_by: head_id
        color_by: head_id
        model_ids:
          - olmo_step10k
        parameter_names:
          - re:.*${param_name}.*layer=${layer}.*head=(01|04|07|10|13|16).*
        x_title: ""
    
        # violin styling
        side: positive
        points: false
        box_visible: true
        meanline_visible: true
    
        # jitter overlay
        jitter: true
        jitter_width: 0.12
        jitter_offset: -0.25
        jitter_seed: 42
        jitter_density_scale: true
        jitter_marker_size: 3
        jitter_opacity: 0.6
        jitter_color_field: weights_svals
        jitter_colorscale: Portland
        jitter_show_colorbar: true
        
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 2
      col: 1
      title: "128k pre-train steps model"
      plot:
        _target_: diffract.viz.plots.violin.ViolinPlot
        field: weights_svals
        group_by: head_id
        color_by: head_id
        model_ids:
          - olmo_step100k
        parameter_names:
          - re:.*${param_name}.*layer=${layer}.*head=(01|04|07|10|13|16).*
    
        # violin styling
        side: positive
        points: false
        box_visible: true
        meanline_visible: true
    
        # jitter overlay
        jitter: true
        jitter_width: 0.12
        jitter_offset: -0.25
        jitter_seed: 42
        jitter_density_scale: true
        jitter_marker_size: 3
        jitter_opacity: 0.6
        jitter_color_field: weights_svals
        jitter_colorscale: Portland
        jitter_show_colorbar: true
