param_name: ???
metric: ???

plot:
  _target_: diffract.viz.plots.configurer.UpdateFigure
  layout:
    width: 800
    height: 600
    title: "${param_name}: ${metric}"
  plot:
    _target_: diffract.viz.plots.subplots.GridPlot
    make_subplots_kwargs:
      rows: 2
      cols: 1
      shared_yaxes: false
      shared_xaxes: false
      vertical_spacing: 0.1
    subplots:
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 1
      col: 1
      title: "16k pre-train steps model"
      plot:
         _target_: diffract.viz.plots.heatmap.HeatmapPivotPlot
         parameter_names:
          - re:.*${param_name}.*
         model_ids:
          - olmo_step10k
         value_field: ${metric}
         col_by: layer_id
         row_by: head_id
         show_text: false
         colorscale: Turbo
         x_title: ""
      
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 2
      col: 1
      title: "128k pre-train steps model"
      plot:
         _target_: diffract.viz.plots.heatmap.HeatmapPivotPlot
         parameter_names:
          - re:.*${param_name}.*
         model_ids:
          - olmo_step100k
         value_field: ${metric}
         col_by: layer_id
         row_by: head_id
         show_text: false
         colorscale: Turbo
