plot:
  _target_: diffract.viz.plots.configurer.UpdateFigure
  layout:
    width: 1000
    height: 400
    coloraxis:
      colorbar:
        title: "layer"
  plot:
    _target_: diffract.viz.plots.subplots.GridPlot
    make_subplots_kwargs:
      rows: 1
      cols: 4
      shared_yaxes: false
      shared_xaxes: false
      horizontal_spacing: 0.03
    subplots:
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 1
      col: 1
      title: "Frob norm"
      plot:
         _target_: diffract.viz.plots.scalar.BoxPlot
         parameter_names:
          - re:.*(q|k|v|o)_proj_head.*
         field: frob_norm
         group_by: model_id
         color_by: model_id
         x_title: ""
         y_title: ""
     
         # show only box; jitter is drawn as separate scatter layer
         boxpoints: false
     
         # jitter overlay
         jitter: true
         jitter_width: 0.12
         jitter_offset: -0.5
         jitter_seed: 42
         jitter_density_scale: true
         jitter_marker_size: 5
         jitter_opacity: 0.6
         jitter_color_field: layer_id
         jitter_colorscale: Turbo
         jitter_show_colorbar: true
      
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 1
      col: 2
      title: "Spectral norm"
      plot:
         _target_: diffract.viz.plots.scalar.BoxPlot
         parameter_names:
          - re:.*(q|k|v|o)_proj_head.*
