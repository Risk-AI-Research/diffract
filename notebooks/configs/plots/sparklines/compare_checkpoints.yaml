plot:
  _target_: diffract.viz.plots.configurer.UpdateFigure
  layout:
    width: 1000
    height: 600
  plot:
    _target_: diffract.viz.plots.subplots.GridPlot
    make_subplots_kwargs:
      rows: 4
      cols: 1
      shared_yaxes: false
      shared_xaxes: false
      vertical_spacing: 0.05
    subplots:
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 1
      col: 1
      title: ""
      plot:
         _target_: diffract.viz.plots.lines.LineByMetaPlot
         parameter_names:
          - re:.*(q|k|v|o)_proj_head.*
         y_field: frob_norm
         x_by: layer_id
         group_by: model_id
         color_by: model_id
         dash_by: model_id
         marker_by: model_id
         mode: lines+markers
         x_title: ""
         y_title: "Frob norm"
      
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 2
      col: 1
      title: ""
      plot:
         _target_: diffract.viz.plots.lines.LineByMetaPlot
         parameter_names:
          - re:.*(q|k|v|o)_proj_head.*
         y_field: l2_norm
         x_by: layer_id
         group_by: model_id
         color_by: model_id
         dash_by: model_id
         marker_by: model_id
         mode: lines+markers
         x_title: ""
         y_title: "Spectral norm"
      
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 3
      col: 1
      title: ""
      plot:
         _target_: diffract.viz.plots.lines.LineByMetaPlot
         parameter_names:
          - re:.*(q|k|v|o)_proj_head.*
         y_field: effective_rank
         x_by: layer_id
         group_by: model_id
         color_by: model_id
         dash_by: model_id
         marker_by: model_id
         mode: lines+markers
         x_title: ""
         y_title: "Effective rank"
      
    - _target_: diffract.viz.plots.subplots.SubplotSpec
      row: 4
      col: 1
      title: ""
      plot:
         _target_: diffract.viz.plots.lines.LineByMetaPlot
         parameter_names:
          - re:.*(q|k|v|o)_proj_head.*
         y_field: stable_rank
         x_by: layer_id
         group_by: model_id
         color_by: model_id
         dash_by: model_id
         marker_by: model_id
         mode: lines+markers
         x_title: "Layer"
         y_title: "Stable rank"
